name: Release Skill

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Detect version tag on HEAD
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "found=$([ -n "$TAG" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Build skill zip
        if: steps.tag.outputs.found == 'true'
        run: |
          mkdir -p _tmp
          cp SKILL.md _tmp/SKILL.md
          cd _tmp
          zip "slidedeck-${{ steps.tag.outputs.name }}.skill" SKILL.md

      - name: Publish release
        if: steps.tag.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Slidedeck Skill ${{ steps.tag.outputs.name }}"
          files: _tmp/slidedeck-${{ steps.tag.outputs.name }}.skill
          generate_release_notes: true
